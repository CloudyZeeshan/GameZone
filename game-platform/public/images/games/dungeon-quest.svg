<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1b4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="640" height="360" fill="url(#bg)"/>
  
  <!-- Dungeon walls -->
  <rect x="50" y="50" width="100" height="20" fill="#4a4a6a" rx="3"/>
  <rect x="200" y="100" width="80" height="20" fill="#4a4a6a" rx="3"/>
  <rect x="400" y="80" width="120" height="20" fill="#4a4a6a" rx="3"/>
  <rect x="100" y="200" width="90" height="20" fill="#4a4a6a" rx="3"/>
  <rect x="350" y="250" width="110" height="20" fill="#4a4a6a" rx="3"/>
  
  <!-- Player character -->
  <circle cx="100" cy="100" r="30" fill="#00ccff" opacity="0.9">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="92" cy="95" r="5" fill="#fff"/>
  <circle cx="108" cy="95" r="5" fill="#fff"/>
  <circle cx="93" cy="95" r="2" fill="#000"/>
  <circle cx="109" cy="95" r="2" fill="#000"/>
  
  <!-- Enemy -->
  <rect x="450" y="150" width="40" height="40" fill="#ff6b6b" rx="5"/>
  <circle cx="460" cy="162" r="4" fill="#fff"/>
  <circle cx="480" cy="162" r="4" fill="#fff"/>
  <circle cx="460" cy="162" r="2" fill="#ff0000"/>
  <circle cx="480" cy="162" r="2" fill="#ff0000"/>
  
  <!-- Key -->
  <circle cx="300" cy="200" r="20" fill="#ffd93d">
    <animate attributeName="r" values="20;22;20" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="300" y="207" font-size="20" text-anchor="middle" fill="#000">🔑</text>
  
  <!-- Portal -->
  <circle cx="520" cy="280" r="35" fill="#6bcb77" opacity="0.8">
    <animate attributeName="opacity" values="0.6;0.9;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="520" y="290" font-size="28" text-anchor="middle">🌀</text>
  
  <!-- Title -->
  <text x="320" y="45" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#fff" text-anchor="middle">
    ⚔️ DUNGEON QUEST
  </text>
  
  <!-- Level badge -->
  <rect x="280" y="310" width="80" height="35" fill="url(#accent)" rx="17"/>
  <text x="320" y="333" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">
    LEVEL 1
  </text>
</svg>
